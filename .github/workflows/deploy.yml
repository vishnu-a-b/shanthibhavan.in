name: Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/sbtcr-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/sbtcr-frontend

jobs:
  # ── Build & push Docker images ───────────────────────────────────────────
  build:
    name: Build & push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      # ── Backend image ─────────────────────────────────────────────────
      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.version }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,mode=max,scope=backend

      # ── Frontend image ────────────────────────────────────────────────
      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./client
          file: ./client/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.version }}
            ${{ env.FRONTEND_IMAGE }}:latest
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_BACKEND_IMAGE_URL=${{ secrets.NEXT_PUBLIC_BACKEND_IMAGE_URL }}
            NEXT_PUBLIC_RAZORPAY_KEY_ID=${{ secrets.NEXT_PUBLIC_RAZORPAY_KEY_ID }}
            NEXT_PUBLIC_PAYPAL_CLIENT_ID=${{ secrets.NEXT_PUBLIC_PAYPAL_CLIENT_ID }}
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,mode=max,scope=frontend

  # ── Deploy to server ─────────────────────────────────────────────────────
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:        ${{ secrets.SSH_HOST }}
          username:    ${{ secrets.SSH_USER }}
          key:         ${{ secrets.SSH_PRIVATE_KEY }}
          port:        ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e

            # Navigate to project directory
            cd ${{ secrets.DEPLOY_PATH || '~/sbtcr' }}

            # Discard any local changes and sync to remote
            git fetch origin main
            git reset --hard origin/main

            # Log in to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull new images
            export IMAGE_TAG=${{ needs.build.outputs.image_tag }}
            docker pull ghcr.io/${{ github.repository_owner }}/sbtcr-backend:${IMAGE_TAG}
            docker pull ghcr.io/${{ github.repository_owner }}/sbtcr-frontend:${IMAGE_TAG}

            # Tag as latest
            docker tag ghcr.io/${{ github.repository_owner }}/sbtcr-backend:${IMAGE_TAG}  \
                       ghcr.io/${{ github.repository_owner }}/sbtcr-backend:latest
            docker tag ghcr.io/${{ github.repository_owner }}/sbtcr-frontend:${IMAGE_TAG} \
                       ghcr.io/${{ github.repository_owner }}/sbtcr-frontend:latest

            # Install docker compose v2 plugin if not present
            if ! docker compose version > /dev/null 2>&1; then
              DOCKER_CONFIG=${DOCKER_CONFIG:-$HOME/.docker}
              mkdir -p "$DOCKER_CONFIG/cli-plugins"
              curl -fsSL "https://github.com/docker/compose/releases/download/v2.27.1/docker-compose-linux-$(uname -m)" \
                -o "$DOCKER_CONFIG/cli-plugins/docker-compose"
              chmod +x "$DOCKER_CONFIG/cli-plugins/docker-compose"
            fi

            # Rolling restart with zero-downtime
            docker compose up -d --no-build

            # Remove dangling images
            docker image prune -f
