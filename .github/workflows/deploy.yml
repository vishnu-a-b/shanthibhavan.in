name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          port:     ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e

            cd ${{ secrets.DEPLOY_PATH || '~/sbtcr' }}

            # ── Sync code ────────────────────────────────────────────────
            git fetch origin main
            git reset --hard origin/main

            # ── Ensure PM2 is installed ──────────────────────────────────
            if ! command -v pm2 > /dev/null 2>&1; then
              npm install -g pm2
            fi

            # ── Build backend ────────────────────────────────────────────
            cd backend
            npm ci
            npm run build
            cd ..

            # ── Build frontend ───────────────────────────────────────────
            cd client
            npm ci
            NODE_OPTIONS=--max-old-space-size=4096 npm run build
            cd ..

            # ── Reload or start via PM2 ──────────────────────────────────
            pm2 startOrRestart pm2.config.cjs --env production
            pm2 save

            # ── Sync nginx config and reload ─────────────────────────────
            sudo cp nginx/shanthibhavan.conf /etc/nginx/sites-available/shanthibhavan
            sudo ln -sf /etc/nginx/sites-available/shanthibhavan \
                        /etc/nginx/sites-enabled/shanthibhavan
            sudo nginx -t && sudo nginx -s reload
