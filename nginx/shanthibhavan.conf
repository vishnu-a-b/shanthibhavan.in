upstream sbtcr_backend  { server 127.0.0.1:3003; }
upstream sbtcr_frontend { server 127.0.0.1:3005; }

server {
    listen 80;
    server_name _;          # replace with your domain, e.g. shanthibhavan.in

    client_max_body_size 50M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    # ── Backend API ────────────────────────────────────────────────────────
    location /v1/ {
        proxy_pass         http://sbtcr_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # ── Uploaded files ─────────────────────────────────────────────────────
    location /uploads/ {
        proxy_pass         http://sbtcr_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── Next.js static assets ─────────────────────────────────────────────
    location /_next/static/ {
        proxy_pass         http://sbtcr_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Frontend ──────────────────────────────────────────────────────────
    location / {
        proxy_pass         http://sbtcr_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }
}
