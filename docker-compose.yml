services:

  # ── Backend ──────────────────────────────────────────────────────────────
  backend:
    image: ${BACKEND_IMAGE}:${IMAGE_TAG:-latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
    volumes:
      - uploads_data:/app/public/uploads
    expose:
      - "3003"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3003/v1/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Frontend ─────────────────────────────────────────────────────────────
  frontend:
    image: ${FRONTEND_IMAGE}:${IMAGE_TAG:-latest}
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_BACKEND_IMAGE_URL: ${NEXT_PUBLIC_BACKEND_IMAGE_URL}
        NEXT_PUBLIC_RAZORPAY_KEY_ID: ${NEXT_PUBLIC_RAZORPAY_KEY_ID}
        NEXT_PUBLIC_PAYPAL_CLIENT_ID: ${NEXT_PUBLIC_PAYPAL_CLIENT_ID}
    restart: unless-stopped
    env_file:
      - ./client/.env.local
    environment:
      - NODE_ENV=production
    expose:
      - "3005"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3005"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Nginx reverse proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Uncomment for SSL:
      # - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend

volumes:
  uploads_data:
    driver: local
